name: OpenClawHAOSAddon-Rust
version: "2026.04.07.3"
slug: openclaw_assistant_rust
description: Rust rewrite of the local HAOS add-on layer while keeping upstream OpenClaw runtimes unchanged.
url: https://github.com/sunboss/OpenClawHAOSAddon-Rust
image: ghcr.io/sunboss/openclawhaosaddon-rust
arch:
  - amd64
  - aarch64
startup: services
boot: manual
init: false
host_network: true
ingress: true
ingress_port: 48099
panel_title: OpenClawHAOSAddon-Rust
panel_icon: mdi:robot-industrial

map:
  - addon_config:rw
  - share:rw

options:
  timezone: "Asia/Shanghai"
  enable_terminal: true
  terminal_port: 7681
  gateway_mode: local
  gateway_remote_url: ""
  gateway_public_url: ""
  gateway_port: 18789
  access_mode: lan_https
  enable_openai_api: true
  auto_configure_mcp: true
  homeassistant_token: ""
  auto_approve_device_pairing: true
  run_doctor_on_start: true

schema:
  timezone: str
  enable_terminal: bool?
  terminal_port: int(1024,65535)?
  gateway_mode: list(local|remote)?
  gateway_remote_url: str?
  gateway_public_url: str?
  gateway_port: int(1,65535)?
  access_mode: list(custom|local_only|lan_https|lan_reverse_proxy|tailnet_https)?
  enable_openai_api: bool?
  auto_configure_mcp: bool?
  homeassistant_token: str?
  auto_approve_device_pairing: bool?
  run_doctor_on_start: bool?
