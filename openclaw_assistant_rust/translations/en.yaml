configuration:
  timezone:
    name: Timezone
    description: Timezone used inside the add-on container.
  gateway_mode:
    name: Gateway Mode
    description: Run a local gateway or connect to a remote one.
    options:
      local: Local
      remote: Remote
  gateway_remote_url:
    name: Remote Gateway URL
    description: WebSocket URL used when gateway mode is remote.
  gateway_public_url:
    name: Gateway Public URL
    description: Public URL used by the "Open Gateway" button in the UI.
  gateway_port:
    name: Gateway HTTPS Port
    description: External HTTPS proxy port used by the add-on.
  access_mode:
    name: Access Mode
    description: Access preset reflected in the Rust UI.
    options:
      custom: Custom
      local_only: Local Only
      lan_https: LAN HTTPS
      lan_reverse_proxy: LAN Reverse Proxy
      tailnet_https: Tailnet HTTPS
  enable_openai_api:
    name: Enable OpenAI API
    description: Enable the OpenAI-compatible chat completions endpoint.
  auto_configure_mcp:
    name: Enable Native Home Assistant MCP
    description: Register Home Assistant's MCP endpoint through mcporter at startup.
  homeassistant_token:
    name: Home Assistant Token
    description: Long-lived Home Assistant token used for MCP registration.
  run_doctor_on_start:
    name: Run Doctor On Start
    description: Run openclaw doctor shortly after startup for diagnostics.
  dangerous_enable_haos_http_control_ui_debug:
    name: Dangerous HAOS HTTP Control UI Debug
    description: Temporarily allow the Home Assistant HTTP sidebar page to force-open the OpenClaw Control UI for debugging. This weakens device-auth protection and should stay off in normal use.
