    <text x="1212" y="216" fill="#F0F5FB" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">2026.04.15.11</text>
    <text x="1322" y="216" fill="#F0F5FB" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">v2026.4.14</text>
    <text x="1212" y="252" fill="#8EA3BD" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.2">GATEWAY PID</text>
    <text x="1322" y="252" fill="#8EA3BD" font-size="13" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.2">UPTIME</text>
    <text x="1212" y="292" fill="#F0F5FB" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="800">36</text>
    <text x="1322" y="292" fill="#F0F5FB" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="800">2 小时</text>
