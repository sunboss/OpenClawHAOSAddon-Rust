    <text x="130" y="384" fill="#97A9C0" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="3">当前模型</text>
    <text x="130" y="474" fill="#EEF5FB" font-size="60" font-family="Segoe UI, Arial, sans-serif" font-weight="800">gpt-5.4</text>
    <text x="130" y="526" fill="#9CB0C7" font-size="28" font-family="Segoe UI, Arial, sans-serif">openai-codex</text>
    <text x="130" y="556" fill="#76889D" font-size="18" font-family="Segoe UI, Arial, sans-serif">直接从运行配置读取，不再手写占位值</text>
