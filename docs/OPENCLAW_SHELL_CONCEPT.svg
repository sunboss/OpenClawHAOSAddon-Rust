    <text x="610" y="474" fill="#8BF0C7" font-size="60" font-family="Segoe UI, Arial, sans-serif" font-weight="800">已就绪</text>
    <text x="610" y="526" fill="#CFDAE7" font-size="28" font-family="Segoe UI, Arial, sans-serif">OpenClaw Gateway 已通过健康检查</text>
