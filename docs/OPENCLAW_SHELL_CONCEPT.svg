  <rect width="1600" height="1180" fill="url(#bg)"/>
  <rect width="1600" height="1180" fill="url(#glowA)"/>
  <rect width="1600" height="1180" fill="url(#glowB)"/>
  <rect width="1600" height="1180" fill="url(#grid)"/>

  <g filter="url(#shadow)">
    <rect x="54" y="44" width="1492" height="1090" rx="36" fill="url(#panel)" stroke="#6B88A3" stroke-opacity="0.16"/>
