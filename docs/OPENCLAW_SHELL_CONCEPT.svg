    <rect x="36" y="274" width="142" height="44" rx="22" fill="url(#ctaFill)"/>
    <text x="107" y="303" fill="#07101A" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="800" text-anchor="middle">打开网关</text>
    <rect x="36" y="326" width="142" height="44" rx="22" fill="#0F1A2D" stroke="#47D2EA" stroke-opacity="0.26"/>
    <text x="107" y="355" fill="#EEF5FB" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">进入命令行</text>
