    <text x="130" y="1068" fill="#47D2EA" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="3">令牌与授权操作带</text>
    <text x="130" y="1102" fill="#9DB0C6" font-size="24" font-family="Segoe UI, Arial, sans-serif">左侧显示 Token 与复制控制，右侧显示待批准设备与确认授权按钮。整体压成一条薄操作带，不再撑大页面。</text>
