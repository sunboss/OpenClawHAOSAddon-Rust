  <text x="214" y="218" fill="#D3DEEB" font-size="24" font-family="Segoe UI, Arial, sans-serif">更像一张持续值守的 Agent 入口海报，而不是普通后台。原生 HTTPS 网关优先，</text>
  <text x="214" y="256" fill="#D3DEEB" font-size="24" font-family="Segoe UI, Arial, sans-serif">HAOS Ingress 测试路径与维护 Shell 保留在同一工作面上。</text>

