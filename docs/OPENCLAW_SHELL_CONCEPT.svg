    <rect x="948" y="786" width="88" height="88" rx="26" fill="#163549" stroke="#47D2EA" stroke-opacity="0.18"/>
    <path d="M975 844l11-12-11-12M1000 852h18" stroke="#47D2EA" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="948" y="930" fill="#4BD9EF" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="3">原生命令行</text>
    <text x="948" y="990" fill="#EEF5FB" font-size="58" font-family="Segoe UI, Arial, sans-serif" font-weight="800">维护 Shell</text>
    <text x="948" y="1044" fill="#D3DEEB" font-size="28" font-family="Segoe UI, Arial, sans-serif">在完整的 Web Shell 里运行 openclaw 命令、查看日志、</text>
    <text x="948" y="1082" fill="#D3DEEB" font-size="28" font-family="Segoe UI, Arial, sans-serif">核对设备授权，不再绕旧终端注入路径。</text>
    <rect x="948" y="1112" width="240" height="62" rx="31" fill="url(#ctaFill)"/>
    <text x="1068" y="1152" fill="#07101A" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="800" text-anchor="middle">进入命令行</text>
