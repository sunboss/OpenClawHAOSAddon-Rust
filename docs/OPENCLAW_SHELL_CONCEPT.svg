<svg width="1600" height="1180" viewBox="0 0 1600 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="180" y1="0" x2="1400" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10192B"/>
      <stop offset="0.52" stop-color="#09111E"/>
      <stop offset="1" stop-color="#050A14"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(286 116) rotate(20) scale(460 240)">
      <stop stop-color="#267983" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#267983" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1228 160) rotate(133) scale(420 280)">
      <stop stop-color="#47D2EA" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#47D2EA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#101A2E" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0B1322" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="softPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#132338" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#0A1120" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="tealStroke" x1="0" y1="0" x2="1" y2="1">
